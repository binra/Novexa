<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Benar</title>

    <link rel="stylesheet" href="style.css">


</head>

<body>



<header>

    <div class="logo">

        <a href="index.html">
            <img src="images/logo.png" alt="Logo">
        </a>

        <h1>Admin Panel</h1>

        <button id="logoutBtn">Logout</button>

    </div>

</header>

<main class="admin-page">

    <h2>Add New Product</h2>

    <input type="hidden" id="productId">
    
    <div class="dashboard-cards">

    <div class="card">
        <h3>Total Products</h3>
        <h2 id="totalProducts">0</h2>
    </div>

    <div class="card">
        <h3>Featured Products</h3>
        <h2 id="featuredProducts">0</h2>
    </div>

    <div class="card">
        <h3>Best Deals</h3>
        <h2 id="bestDeals">0</h2>
    </div>

    <div class="card">
        <h3>Best Sellers</h3>
        <h2 id="bestSellers">0</h2>
    </div>

    <div class="card">
        <h3>Total Clicks</h3>
        <span id="totalClicks">0</span>
    </div>

    </div>

    <form id="productForm">

        <input
            type="text"
            id="title"
            placeholder="Product Name"
            required
        >

        <input
            type="number"
            id="price"
            placeholder="Price"
            required
        >

        <input
            type="text"
            id="image"
            placeholder="Image Path"
            required
        >

        <select id="category" required>

            <option value="">Select Category</option>

        </select>
        
        <label>

            

        <label>

            <input type="checkbox" id="bestDeal">

             Best Deal

        </label>

        <label>

            <input type="checkbox" id="newArrival">

             New Arrival

        </label>

        <label>
            <input type="checkbox" id="bestSeller">
            Best Seller
        </label>
        <input
            type="text"
            id="link"
            placeholder="Amazon Affiliate Link"
            required
        >
        
        <div class="form-group">

            <label>

                <input type="checkbox" id="featured">

                Featured Product

            </label>

        </div>

        <textarea
            id="description"
            placeholder="Description"
            rows="5"
        ></textarea>

        <input
        type="number"
        id="rating"
        placeholder="Rating (0 - 5)"
        step="0.1"
        min="0"
        max="5"
        >

        <input
        type="number"
        id="reviews"
        placeholder="Reviews Count"
        min="0"
        >
        <button type="submit">
            Add Product
        </button>

    </form>

    
<hr>

<h2>Category Manager</h2>

<form id="categoryForm">

    <input
        type="text"
        id="categoryName"
        placeholder="Category Name"
        required
    >

    <input
        type="text"
        id="categoryIcon"
        placeholder="Icon (📱)"
        required
    >

    <button type="submit">
        Add Category
    </button>

</form>

<div id="categoryList"></div>

<hr>

<h2>Banner Manager</h2>

<form id="bannerForm">

    <input
        type="text"
        id="bannerTitle"
        placeholder="Banner Title"
        required
    >

    <input
        type="text"
        id="bannerImage"
        placeholder="Banner Image URL"
        required
    >

    <input
        type="text"
        id="bannerLink"
        placeholder="Banner Link"
    >

    <button type="submit">

        Add Banner

    </button>

</form>

<div id="bannerList"></div>

<h2>Products</h2>

<div id="adminProducts"></div>
</main>



<script type="module" src="admin.js"></script>

</body>
</html>
